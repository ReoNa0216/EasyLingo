name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Install dependencies
        run: npm install
        
      - name: Build Tauri app
        run: npm run build:win
        
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: EasyLingo-Windows
          path: src-tauri/target/release/bundle/nsis/EasyLingo_2.0.0_x64-setup.exe

  create-release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: EasyLingo-Windows
          path: EasyLingo-Windows
          
      - name: Zip prompt-examples
        run: |
          cd prompt-examples
          zip -r ../prompt-examples.zip .
          cd ..
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            EasyLingo-Windows/EasyLingo_2.0.0_x64-setup.exe
            API_configuration.pdf
            prompt-examples.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
